[build]
builder = "nixpacks"
buildCommand = "corepack enable && NODE_ENV=development pnpm install && npx --prefix packages/database prisma generate --schema=packages/database/prisma/schema.prisma && pnpm --filter @community-os/api build"

[deploy]
startCommand = "node apps/api/dist/apps/api/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 4000
