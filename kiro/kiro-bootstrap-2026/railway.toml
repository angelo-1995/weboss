[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install && pnpm --filter @community-os/database db:generate && pnpm --filter @community-os/api build"

[deploy]
startCommand = "node apps/api/dist/apps/api/src/main.js"
healthcheckPath = "/api/v1/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 4000
