name: biblia_rvr1960
description: Premium offline-first Android Bible reading app for the Reina Valera 1960.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  share_plus: ^9.0.0
  path_provider: ^2.1.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/bible/
